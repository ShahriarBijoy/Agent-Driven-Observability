apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedder
  labels:
    app: embedder
  annotations:
    kubernetes.io/change-cause: "phase-7: embedder moves into the cluster"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedder
  template:
    metadata:
      labels:
        app: embedder
    spec:
      containers:
        - name: embedder
          image: obs/embedder
          workingDir: /app/apps/embedder
          command: ["bun", "run", "start"]
          env:
            - name: EMBEDDER_PORT
              value: "8081"
          envFrom:
            - secretRef:
                name: subject-db-credentials
            - configMapRef:
                name: subject-telemetry
          ports:
            - name: http
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 512Mi
