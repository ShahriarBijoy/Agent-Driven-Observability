apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-proxy
  labels:
    app: model-proxy
  annotations:
    kubernetes.io/change-cause: "phase-7: model-proxy moves into the cluster"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-proxy
  template:
    metadata:
      labels:
        app: model-proxy
    spec:
      containers:
        - name: model-proxy
          image: obs/model-proxy
          workingDir: /app/apps/model-proxy
          command: ["bun", "run", "start"]
          env:
            # Per-pod metric identity (see gateway/deployment.yaml).
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.instance.id=$(POD_NAME),k8s.pod.name=$(POD_NAME)"
            - name: MODEL_PROXY_PORT
              value: "8083"
          envFrom:
            - secretRef:
                name: subject-db-credentials
            - configMapRef:
                name: subject-telemetry
          ports:
            - name: http
              containerPort: 8083
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 512Mi
