apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
  annotations:
    kubernetes.io/change-cause: "phase-7: gateway moves into the cluster"
spec:
  # Two replicas: a single pod-kill blips 5xx without a full outage, and a
  # drain has something to reschedule.
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: obs/gateway
          workingDir: /app/apps/gateway
          command: ["bun", "run", "start"]
          env:
            # Per-pod metric identity: without service.instance.id, replicas
            # export IDENTICAL series and their interleaved counters make
            # rate() see resets (compose never hit this - single instances).
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.instance.id=$(POD_NAME),k8s.pod.name=$(POD_NAME)"
            - name: GATEWAY_PORT
              value: "8080"
            - name: EMBEDDER_URL
              value: http://embedder:8081
            - name: RETRIEVER_URL
              value: http://retriever:8082
            - name: MODEL_PROXY_URL
              value: http://model-proxy:8083
            - name: DEV_TOKEN
              value: dev-local-token
          envFrom:
            # DATABASE_URL / REDIS_URL from the Secret (stale-secret incidents
            # need a Secret, not inline env); OTLP + Marquez egress from the
            # per-profile telemetry ConfigMap.
            - secretRef:
                name: subject-db-credentials
            - configMapRef:
                name: subject-telemetry
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            # Requests across the subject system are sized so the full set
            # CANNOT fit on one 2g agent - cordon/drain must produce real
            # FailedScheduling evidence (PLAN-2 P7).
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 512Mi
