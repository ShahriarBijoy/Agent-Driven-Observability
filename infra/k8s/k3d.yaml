# k3d SimpleConfig - the lab cluster, as code (PLAN-2 Phase 7).
#
# Profile A: this cluster runs on the obs-vm (Tailscale), created by
# `obs k8s up` (which copies this file + ports.env over ssh, sources the
# map, then runs k3d). Port numbers are plain ${VAR} - k3d's env expansion
# is os.ExpandEnv-style and does NOT understand ${VAR:-default} (that form
# silently expands to empty and k3d picks RANDOM host ports). Never create
# the cluster without sourcing infra/ports.env first.
#
# Topology: 1 tainted server (control plane only) + 2 killable agents.
# Workloads land ONLY on agents - that is what makes cordon/drain and
# node-kill scenarios produce real FailedScheduling/eviction evidence.
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: obs-lab
servers: 1
agents: 2
# Pin k3s itself - "whatever k3d ships this week" is not reproducible.
image: rancher/k3s:v1.35.5-k3s1

kubeAPI:
  # host becomes a TLS SAN and the kubeconfig server name: the laptop reaches
  # the API as https://obs-vm:6550 over the tailnet (MagicDNS resolves it).
  host: obs-vm
  # All VM interfaces: tailnet traffic arrives on tailscale0; the Hetzner
  # firewall keeps the public side shut. Pinned port = kubeconfig survives
  # cluster recreates.
  hostIP: 0.0.0.0
  hostPort: "${OBS_K3D_API_PORT}"

ports:
  # The lab's existing port contract: :8080 answers exactly as it did under
  # compose - now k3d LB -> Traefik :80 -> gateway Service.
  - port: ${OBS_GATEWAY_PORT}:80
    nodeFilters: [loadbalancer]

registries:
  create:
    # Local registry for the build->push->pull path (GitOps uses it in P10).
    # Reachable as localhost:5010 on the VM (push side) and as
    # obs-registry:5010 from inside the cluster (pull side, via the
    # registries.yaml mirror k3d generates).
    name: obs-registry
    host: "0.0.0.0"
    hostPort: "${OBS_REGISTRY_PORT}"

options:
  k3d:
    wait: true
    timeout: 180s
  k3s:
    extraArgs:
      # Control plane is not a workload node (k3s' packaged addons - coredns,
      # traefik, metrics-server - carry the CriticalAddonsOnly toleration).
      - arg: --node-taint=CriticalAddonsOnly=true:NoSchedule
        nodeFilters: [server:0]
      # Node-kill demos should conclude in 1-2 min, not the upstream 5+:
      # these two shrink the window before pods on a dead node get evicted.
      # NOTE: apiserver flags, not scheduler/controller-manager (PLAN-2 SS04).
      - arg: --kube-apiserver-arg=default-not-ready-toleration-seconds=30
        nodeFilters: [server:0]
      - arg: --kube-apiserver-arg=default-unreachable-toleration-seconds=30
        nodeFilters: [server:0]
      # The default 1h cap would kill the agents' week-long read-only token
      # mid-exam (P12); kubectl create token --duration=168h must be mintable.
      - arg: --kube-apiserver-arg=service-account-max-token-expiration=336h
        nodeFilters: [server:0]
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
  runtime:
    # Per-agent memory cap: the subject system's requests are sized so the
    # full set cannot fit on one agent (forces real scheduling pressure).
    agentsMemory: 2g
