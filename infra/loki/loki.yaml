# Loki single-binary, local filesystem storage. Dev-only (no replication, no
# object store). Generous limits so load-gen traffic never gets rate-limited.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Structured metadata is how OTLP logs carry trace_id/span_id (Loko 3.x).
  allow_structured_metadata: true
  volume_enabled: true
  # Dev-generous ingestion so sustained load never trips a rate limit.
  ingestion_rate_mb: 32
  ingestion_burst_size_mb: 64
  reject_old_samples: false

frontend:
  encoding: protobuf
