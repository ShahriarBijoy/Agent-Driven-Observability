#cloud-config
# AI Observability Lab - Act II "prod" VM (Profile A, PLAN-2 SS C).
#
# Paste this whole file into the "Cloud config" box when creating the Hetzner
# CAX21 (Ubuntu 24.04, ARM). One value to edit before pasting:
#
#   TS_AUTHKEY below - a Tailscale auth key (Admin console -> Settings ->
#   Keys -> Auth keys -> Generate; enable "Pre-approved"). With it, the VM
#   joins your tailnet by itself on first boot. If you leave the placeholder,
#   ssh in over the public IP afterwards and run:  tailscale up --ssh --hostname=obs-vm
#
# Everything else is hands-off: Docker, k3d (pinned), kubectl, helm, a 4 GB
# swap file (absorbs docker-build spikes on 8 GB), and inotify headroom for
# k3s. Provisioning takes ~4-6 minutes after boot; progress lands in
# /var/log/cloud-init-output.log and the last line touches
# /etc/obs-lab/.provisioned when done.

hostname: obs-vm
package_update: true
package_upgrade: true
packages:
  - curl
  - git
  - jq
  - ca-certificates

swap:
  filename: /swap.img
  size: 4G
  maxsize: 4G

write_files:
  # k3s inside k3d exhausts Ubuntu's default inotify budget once the whole
  # subject system is scheduled; raise it before the cluster ever starts.
  - path: /etc/sysctl.d/99-obs-lab.conf
    content: |
      fs.inotify.max_user_instances=512
      fs.inotify.max_user_watches=524288
  # Without rotation caps a chatty pod can eat the 80 GB disk over weeks.
  - path: /etc/docker/daemon.json
    content: |
      { "log-driver": "json-file", "log-opts": { "max-size": "10m", "max-file": "3" } }
  - path: /etc/obs-lab/provision.env
    content: |
      K3D_VERSION=v5.9.0
      TS_AUTHKEY=tskey-auth-REPLACE_ME
  # Cluster pods reach the tailnet (laptop Alloy/Marquez) only if their
  # docker-bridge source IPs are masqueraded onto tailscale0 - tailscale
  # drops forwarded packets with foreign sources otherwise.
  - path: /etc/systemd/system/obs-lab-nat.service
    content: |
      [Unit]
      Description=NAT container traffic onto the tailnet (obs-lab Profile A)
      After=tailscaled.service docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/sbin/sysctl -w net.ipv4.ip_forward=1
      ExecStart=/usr/sbin/iptables -t nat -A POSTROUTING -o tailscale0 -j MASQUERADE
      ExecStop=/usr/sbin/iptables -t nat -D POSTROUTING -o tailscale0 -j MASQUERADE

      [Install]
      WantedBy=multi-user.target
  # k3d/compose publish their host ports on 0.0.0.0, which on a cloud VM means
  # the public internet - and the k3d registry accepts anonymous push. Docker
  # writes its own FORWARD/NAT rules that never traverse INPUT, so an INPUT-based
  # firewall does nothing; DOCKER-USER is the supported seam. Keep this in sync
  # with infra/vm/obs-lockdown.sh (this file must stay self-contained: it is
  # pasted into the Hetzner console).
  - path: /usr/local/sbin/obs-lockdown
    permissions: "0755"
    content: |
      #!/bin/sh
      set -e
      WAN="${OBS_WAN_IF:-eth0}"
      apply() {
        for ipt in iptables ip6tables; do
          "$ipt" -C DOCKER-USER -m conntrack --ctstate RELATED,ESTABLISHED -j RETURN 2>/dev/null \
            || "$ipt" -I DOCKER-USER 1 -m conntrack --ctstate RELATED,ESTABLISHED -j RETURN
          "$ipt" -C DOCKER-USER -i "$WAN" -j DROP 2>/dev/null \
            || "$ipt" -A DOCKER-USER -i "$WAN" -j DROP
        done
      }
      clear_rules() {
        for ipt in iptables ip6tables; do
          "$ipt" -D DOCKER-USER -i "$WAN" -j DROP 2>/dev/null || true
          "$ipt" -D DOCKER-USER -m conntrack --ctstate RELATED,ESTABLISHED -j RETURN 2>/dev/null || true
        done
      }
      case "$1" in
        apply) apply ;;
        clear) clear_rules ;;
        status) iptables -S DOCKER-USER; ip6tables -S DOCKER-USER ;;
        *) echo "usage: obs-lockdown apply|clear|status" >&2; exit 2 ;;
      esac
  - path: /etc/systemd/system/obs-lockdown.service
    content: |
      [Unit]
      Description=Restrict published container ports to the tailnet (obs-lab)
      After=docker.service
      Requires=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/local/sbin/obs-lockdown apply
      ExecStop=/usr/local/sbin/obs-lockdown clear

      [Install]
      WantedBy=multi-user.target

runcmd:
  - sysctl --system
  - curl -fsSL https://get.docker.com | sh
  - >
    . /etc/obs-lab/provision.env &&
    curl -fsSL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh
    | TAG=$K3D_VERSION bash
  - >
    ARCH=$(dpkg --print-architecture) &&
    KVER=$(curl -Ls https://dl.k8s.io/release/stable.txt) &&
    curl -fsSLo /usr/local/bin/kubectl
    "https://dl.k8s.io/release/${KVER}/bin/linux/${ARCH}/kubectl" &&
    chmod +x /usr/local/bin/kubectl
  - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  - curl -fsSL https://tailscale.com/install.sh | sh
  # --ssh: the laptop authenticates ssh via tailnet identity, no key juggling.
  - >
    . /etc/obs-lab/provision.env &&
    if [ "$TS_AUTHKEY" != "tskey-auth-REPLACE_ME" ]; then
    tailscale up --authkey="$TS_AUTHKEY" --ssh --hostname=obs-vm;
    fi
  - systemctl daemon-reload && systemctl enable --now obs-lab-nat.service
  - systemctl enable --now obs-lockdown.service
  - touch /etc/obs-lab/.provisioned
