# Mimir monolithic mode (-target=all), local filesystem block storage. Dev-only.
# Accepts both OTLP (/otlp/v1/metrics, from Alloy) and Prometheus remote-write
# (/api/v1/push, from Tempo's metrics-generator). Exemplars are enabled so the
# metric-exemplar -> trace drill-down works in Grafana.
multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: warn
  grpc_server_max_recv_msg_size: 104857600
  grpc_server_max_send_msg_size: 104857600
  grpc_server_max_concurrent_streams: 1000

distributor:
  ring:
    kvstore:
      store: memberlist

ingester:
  ring:
    min_ready_duration: 0s
    final_sleep: 0s
    num_tokens: 512
    kvstore:
      store: inmemory
    replication_factor: 1

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks
  tsdb:
    dir: /data/mimir/tsdb
  bucket_store:
    sync_dir: /data/mimir/tsdb-sync

compactor:
  data_dir: /data/mimir/compactor

ruler_storage:
  backend: local
  local:
    directory: /data/mimir/rules

limits:
  # REQUIRED to store/serve exemplars (default 0 = disabled).
  max_global_exemplars_per_user: 100000
  # Tempo's metrics-generator sends native histograms.
  native_histograms_ingestion_enabled: true
  # Tolerate slightly late samples in a bursty dev environment.
  out_of_order_time_window: 1h
  # Apply Prometheus-style suffixes (_total, _seconds) to OTLP metrics.
  otel_metric_suffixes_enabled: true
  # P10: lift the canary identity out of the OTel resource and onto every
  # metric series (label rollouts_pod_template_hash) - AnalysisRuns filter
  # canary vs stable on it. Cardinality cost is bounded: at most two hash
  # values exist at once per service, and only during a rollout.
  # (CSV string, not a YAML list - the flag type is a comma-separated slice)
  promote_otel_resource_attributes: rollouts.pod.template.hash
  # Phase 6 — cardinality budget. Cap the active series a single tenant may hold.
  # The lab's healthy footprint is a few thousand series, so this is generous
  # headroom; a label-cardinality explosion (e.g. an un-scrubbed user_id) trips
  # it and Mimir rejects the excess, incrementing
  # cortex_discarded_samples_total{reason=~".*series.*"} — which the
  # "mimir-cardinality" Grafana alert watches. To *see* it fire, lower this to a
  # few hundred and drive traffic. Alloy also drops the usual offenders upstream
  # (see infra/alloy/config.alloy) so this limit is a backstop, not the first line.
  max_global_series_per_user: 100000
  # Blocks retention. Mimir's default is 0 = KEEP FOREVER, which means any
  # cardinality mistake is permanent: the ~155 junk http_route series minted by
  # internet credential scanners (see infra/vm/README.md) would have sat in the
  # RED dashboard's `sum by (http_route)` panel indefinitely, because Mimir has
  # no generally-available series-deletion API to clean them up after the fact.
  #
  # 30d is generous for a lab whose longest SLO window is 28d (see
  # infra/mimir/rules/anonymous/slo-gateway.yaml — shortening this below 28d
  # would silently starve the error-budget rules). Junk series stop being
  # written the moment the fix ships and fully age out one retention period
  # later.
  compactor_blocks_retention_period: 30d
