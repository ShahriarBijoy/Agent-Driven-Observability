# Grafana-managed alert rules (apiVersion 1) for the gateway, queried against
# Mimir (datasource uid "mimir"). Two rules per ADR-003 5e:
#   1. gateway 5xx rate > 2% for 2m
#   2. gateway p95 latency > 2s for 5m
# Each rule pairs an instant Mimir query (refId A) with a threshold expression
# (refId C) that fires when A crosses the bound.
apiVersion: 1

groups:
  - orgId: 1
    name: gateway
    folder: Lab Alerts
    interval: 1m
    rules:
      - uid: gw-5xx
        title: Gateway 5xx rate > 2%
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              refId: A
              expr: 100 * sum(rate(request_duration_seconds_count{service="gateway",http_status_code=~"5.."}[5m])) / clamp_min(sum(rate(request_duration_seconds_count{service="gateway"}[5m])),1)
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 2
        noDataState: OK
        execErrState: Error
        for: 2m
        labels:
          severity: page
        annotations:
          summary: gateway 5xx rate above 2%
      - uid: gw-p95
        title: Gateway p95 latency > 2s
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              refId: A
              expr: histogram_quantile(0.95, sum by (le) (rate(request_duration_seconds_bucket{service="gateway"}[5m])))
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 2
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: page
        annotations:
          summary: gateway p95 latency above 2s

  # Data-quality alerts (Phase 3), queried against Mimir. Same severity=page
  # label as the gateway rules, so they route to the same contact point.
  #   1. any high-severity DQ violation in the last 5m
  #   2. prompt-length drift (KS) sustained > 0.4 for 10m
  - orgId: 1
    name: data-quality
    folder: Lab Alerts
    interval: 1m
    rules:
      - uid: dq-high-violation
        title: DQ high-severity violation
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              refId: A
              expr: sum(increase(dq_violations_total{severity="high"}[5m]))
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        noDataState: OK
        execErrState: OK
        for: 0m
        labels:
          severity: page
        annotations:
          summary: a high-severity data-quality violation fired in the last 5 minutes
      - uid: dq-prompt-drift
        title: DQ prompt drift sustained
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              refId: A
              expr: max(dq_distribution_drift{signal="prompt_chars"})
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.4
        noDataState: OK
        execErrState: OK
        for: 10m
        labels:
          severity: page
        annotations:
          summary: prompt-length drift (KS) above 0.4 for 10 minutes

  # SLO burn-rate alerts (Phase 6), queried against the Mimir recording rules in
  # infra/mimir/rules/anonymous/. Each burn-rate alert fires only when BOTH its
  # short and long windows exceed the burn-rate threshold — encoded directly in
  # PromQL as (short > bool T) * (long > bool T), which is 1 iff both do, so the
  # Grafana threshold is simply "> 0". severity=page routes to the agent-webhook
  # (incident reporter) as sev1; severity=warning as sev2. tenant=acme so the
  # incident lands in the default inbox. See slo/*.yaml for the maths.
  - orgId: 1
    name: slo-burn
    folder: Lab Alerts
    interval: 1m
    rules:
      - uid: slo-avail-fast
        title: SLO gateway availability — fast burn
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              refId: A
              expr: "(slo:gateway_availability:error_ratio5m > bool 0.0672) * (slo:gateway_availability:error_ratio1h > bool 0.0672)"
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        noDataState: OK
        execErrState: OK
        for: 2m
        labels:
          severity: page
          slo: gateway-availability
          tenant: acme
        annotations:
          summary: gateway availability error budget burning fast (2% of the 28d budget in 1h; 5m & 1h windows)
      - uid: slo-avail-slow
        title: SLO gateway availability — slow burn
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              refId: A
              expr: "(slo:gateway_availability:error_ratio30m > bool 0.056) * (slo:gateway_availability:error_ratio6h > bool 0.056)"
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        noDataState: OK
        execErrState: OK
        for: 15m
        labels:
          severity: warning
          slo: gateway-availability
          tenant: acme
        annotations:
          summary: gateway availability error budget burning slowly (10% of the 28d budget in 6h; 30m & 6h windows)
      - uid: slo-latency-fast
        title: SLO gateway latency — fast burn
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              refId: A
              expr: "(slo:gateway_latency:error_ratio5m > bool 0.672) * (slo:gateway_latency:error_ratio1h > bool 0.672)"
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        noDataState: OK
        execErrState: OK
        for: 2m
        labels:
          severity: page
          slo: gateway-latency
          tenant: acme
        annotations:
          summary: gateway latency error budget burning fast (2% of the 28d budget in 1h; 5m & 1h windows)
      - uid: slo-latency-slow
        title: SLO gateway latency — slow burn
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              refId: A
              expr: "(slo:gateway_latency:error_ratio30m > bool 0.56) * (slo:gateway_latency:error_ratio6h > bool 0.56)"
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        noDataState: OK
        execErrState: OK
        for: 15m
        labels:
          severity: warning
          slo: gateway-latency
          tenant: acme
        annotations:
          summary: gateway latency error budget burning slowly (10% of the 28d budget in 6h; 30m & 6h windows)
      - uid: slo-rag-quality
        title: SLO RAG quality — below objective
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              refId: A
              expr: "slo:rag_quality:sli_ratio1h"
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 0.9
        noDataState: OK
        execErrState: OK
        for: 10m
        labels:
          severity: warning
          slo: rag-quality
          tenant: acme
        annotations:
          summary: RAG top-1 relevance below the 90% objective over the last hour (burn-rate alerting saturates for a loose SLO)

  # Cardinality guardrail (Phase 6). Mimir self-monitoring (scraped by Alloy)
  # exposes cortex_discarded_samples_total; when a tenant crosses
  # max_global_series_per_user (mimir.yaml) the series-limit reason increments.
  - orgId: 1
    name: mimir-cardinality
    folder: Lab Alerts
    interval: 1m
    rules:
      - uid: mimir-series-limit
        title: Mimir dropping series (per-tenant limit)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              refId: A
              expr: sum(rate(cortex_discarded_samples_total{reason=~".*series.*"}[5m]))
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        noDataState: OK
        execErrState: OK
        for: 0m
        labels:
          severity: page
          tenant: acme
        annotations:
          summary: Mimir is discarding samples because a per-tenant series limit was crossed (cardinality explosion)

  # Pipeline alerts (PLAN-2 P9), on ci-shim's metrics (scraped from the VM).
  # Routed like everything else: root policy -> agent-webhook -> incident
  # reporter. pipeline-red = main is not shippable (page); queue-stall = jobs
  # queue while nothing completes, i.e. the runner is dead (the pending gauges
  # are the ONLY signal for that - a dead runner emits no completion events).
  - orgId: 1
    name: cicd
    folder: Lab Alerts
    interval: 1m
    rules:
      - uid: cicd-pipeline-red
        title: CI pipeline red on main
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              refId: A
              expr: sum(increase(cicd_pipeline_runs_total{branch="main", result!~"success|skipped"}[15m]))
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        noDataState: OK
        execErrState: OK
        for: 0m
        labels:
          severity: page
          tenant: acme
        annotations:
          summary: a pipeline run on main failed in the last 15m - main is not shippable (test, build, or deploy job red)
      - uid: cicd-queue-stall
        title: CI queue stalled (runner down?)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              refId: A
              # 1 iff a job has been queued > 3m AND nothing completed in 15m -
              # the (short > bool T) * (long > bool T) encoding the burn alerts use.
              expr: "(cicd_pipeline_oldest_pending_seconds > bool 180) * (sum(increase(cicd_pipeline_runs_total[15m])) == bool 0)"
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        noDataState: OK
        execErrState: OK
        for: 2m
        labels:
          severity: warning
          tenant: acme
        annotations:
          summary: CI jobs are queuing (oldest > 3m) with zero completions - the Actions runner is likely down or wedged
