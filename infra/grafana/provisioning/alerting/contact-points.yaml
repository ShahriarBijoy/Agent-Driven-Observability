# Grafana unified-alerting contact points (apiVersion 1).
# "agent-webhook" delivers firing/resolved alerts to the Phase-5 agent-service,
# which spawns the incident reporter. agent-service runs on the host (it needs
# the local Claude Code session for live auth), so Grafana — running in compose —
# reaches it via host.docker.internal. A firing alert produces a postmortem in
# the incident inbox within ~2 minutes.
apiVersion: 1

contactPoints:
  - orgId: 1
    name: agent-webhook
    receivers:
      - uid: agent-webhook
        type: webhook
        settings:
          url: http://host.docker.internal:8093/webhook/grafana-alert
          httpMethod: POST
        disableResolveMessage: false
