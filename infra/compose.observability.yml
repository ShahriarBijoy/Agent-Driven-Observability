# Observability plane (LGTM stack + Grafana Alloy). Compose together with the
# subject system:
#   docker compose -f infra/compose.yml -f infra/compose.observability.yml up -d
#
# Alloy is the single OTLP ingress (4317 gRPC / 4318 HTTP). It fans out to:
#   - Tempo  (traces)  :3200
#   - Mimir  (metrics) :9009
#   - Loki   (logs)    :3100
# Grafana (:3001) provisions all three as data sources, cross-linked.
name: observability-lab

networks:
  # Defined identically in compose.yml; the subject services join this network
  # so they can reach alloy:4318. Declared here too so the observability plane
  # can also be brought up on its own.
  obs:
    name: obs-lab-obs
    driver: bridge

volumes:
  alloy-data:
  loki-data:
  tempo-data:
  mimir-data:
  grafana-data:
  pyroscope-data:

services:
  alloy:
    image: grafana/alloy:v1.16.2
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "${OBS_OTLP_GRPC_PORT:-4317}:4317" # OTLP gRPC
      - "${OBS_OTLP_HTTP_PORT:-4318}:4318" # OTLP HTTP
      - "${OBS_ALLOY_UI_PORT:-12345}:12345" # Alloy UI / readiness
    depends_on:
      - loki
      - tempo
      - mimir
    networks:
      - obs

  loki:
    image: grafana/loki:3.7.2
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "${OBS_LOKI_PORT:-3100}:3100"
    networks:
      - obs

  tempo:
    image: grafana/tempo:3.0.0
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "${OBS_TEMPO_PORT:-3200}:3200"
    networks:
      - obs

  mimir:
    image: grafana/mimir:3.1.0
    command: ["-config.file=/etc/mimir/mimir.yaml"]
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - ./mimir/rules:/data/mimir/rules
      - mimir-data:/data/mimir
    ports:
      - "${OBS_MIMIR_PORT:-9009}:9009"
    networks:
      - obs

  # Continuous profiling (Phase 6). The server is always up so its Grafana
  # datasource and the profiles dashboard resolve; profiles are pushed in by the
  # opt-in eBPF profiler below.
  pyroscope:
    image: grafana/pyroscope:1.14.0
    command: ["-config.file=/etc/pyroscope/pyroscope.yaml"]
    volumes:
      - ./pyroscope/pyroscope.yaml:/etc/pyroscope/pyroscope.yaml:ro
      - pyroscope-data:/data
    ports:
      - "${OBS_PYROSCOPE_PORT:-4040}:4040"
    networks:
      - obs

  # eBPF profiler (Phase 6) — OPT-IN via `--profile profiling` so it can never
  # affect the default `obs up` stack. Bun runs on JavaScriptCore (not V8), so
  # V8-based Node profilers can't see the gateway; eBPF profiles at the kernel
  # level, language-agnostic. Needs a Linux host / Docker Desktop with eBPF+BTF,
  # privileged, and pid: host. See infra/alloy/profiler.alloy.
  alloy-profiler:
    image: grafana/alloy:v1.16.2
    command:
      - run
      - /etc/alloy/profiler.alloy
      - --server.http.listen-addr=0.0.0.0:12346
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./alloy/profiler.alloy:/etc/alloy/profiler.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    privileged: true
    pid: host
    profiles:
      - profiling
    depends_on:
      - pyroscope
    networks:
      - obs

  grafana:
    image: grafana/grafana:13.0.1
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
      # Phase 4: the web control plane (:3003) embeds dashboards in iframes.
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${OBS_GRAFANA_PORT:-3001}:3000"
    depends_on:
      - mimir
      - tempo
      - loki
    networks:
      - obs
