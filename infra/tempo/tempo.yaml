# Tempo single-binary, local block storage. Receives OTLP from Alloy and runs
# the metrics-generator, which computes RED span-metrics + service-graph metrics
# and remote-writes them (with exemplars) to Mimir — this is what powers
# Grafana's Service Map and the exemplar drill-down.
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: observability-lab
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://mimir:9009/api/v1/push
        send_exemplars: true

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors:
        - span-metrics
        - service-graphs
      generate_native_histograms: both

usage_report:
  reporting_enabled: false
