# One Application per service (PLAN-2 P10): this file is the deploy unit.
# CI's "deploy" is a commit bumping newTag here; Argo CD does the rest.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: subject

resources:
  - deployment.yaml
  - service.yaml

images:
  - name: obs/embedder
    newName: obs-registry:5010/embedder
    newTag: "776114b"
