apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedder
  labels:
    app: embedder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedder
  template:
    metadata:
      labels:
        app: embedder
    spec:
      containers:
        - name: embedder
          image: obs/embedder
          workingDir: /app/apps/embedder
          command: ["bun", "run", "start"]
          env:
            # Per-pod metric identity (see gateway/deployment.yaml).
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.instance.id=$(POD_NAME),k8s.pod.name=$(POD_NAME)"
            - name: EMBEDDER_PORT
              value: "8081"
          envFrom:
            - secretRef:
                name: subject-db-credentials
            - configMapRef:
                name: subject-telemetry
          ports:
            - name: http
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            # Right-sized in P10 (steady state ~80Mi); the oomkill scenario
            # patches limits live, so nothing here depends on 384Mi.
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              memory: 512Mi
