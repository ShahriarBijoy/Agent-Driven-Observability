apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  labels:
    app: load-generator
spec:
  # Parked at zero - the compose `load` profile equivalent. Scale to 1 for
  # in-cluster load; targets go via cluster DNS, never host ports.
  replicas: 0
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
        - name: load-generator
          image: obs/load-generator
          workingDir: /app/apps/load-generator
          command: ["bun", "run", "start"]
          env:
            # Per-pod metric identity (see gateway/deployment.yaml).
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.instance.id=$(POD_NAME),k8s.pod.name=$(POD_NAME)"
            - name: GATEWAY_URL
              value: http://gateway:8080
            - name: MODEL_PROXY_URL
              value: http://model-proxy:8083
            - name: RETRIEVER_URL
              value: http://retriever:8082
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
