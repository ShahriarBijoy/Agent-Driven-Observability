# One Application per service (PLAN-2 P10): this file is the deploy unit.
# CI's "deploy" is a commit bumping newTag here; Argo CD does the rest.
# (No Service object - the load-generator only makes outbound requests.)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: subject

resources:
  - deployment.yaml

images:
  - name: obs/load-generator
    newName: obs-registry:5010/load-generator
    newTag: "776114b"
