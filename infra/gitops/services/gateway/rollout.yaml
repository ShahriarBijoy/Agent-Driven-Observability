# Progressive delivery for the request path (PLAN-2 P10). The Rollout
# references the Deployment's pod template (workloadRef) instead of forking
# it - the Deployment stays the single place the template lives, and
# Rollouts scales it to zero once the Rollout owns the pods.
#
# No trafficRouting: canary weight = replica arithmetic behind the plain
# gateway Service (4 replicas -> setWeight 25 is exactly one canary pod).
# The pauses become AnalysisTemplate steps once the hash-label smoke passes
# (P10 task order: the label must exist before anything analyzes on it).
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gateway
spec:
  replicas: 4
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: gateway
  workloadRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
    scaleDown: onsuccess
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: { duration: 3m }
        - setWeight: 50
        - pause: { duration: 3m }
