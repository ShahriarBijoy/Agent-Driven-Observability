# Progressive delivery for the request path (PLAN-2 P10). The Rollout
# references the Deployment's pod template (workloadRef) instead of forking
# it - the Deployment stays the single place the template lives, and
# Rollouts scales it to zero once the Rollout owns the pods.
#
# No trafficRouting: canary weight = replica arithmetic behind the plain
# gateway Service (4 replicas -> setWeight 25 is exactly one canary pod).
# Each analysis step blocks ~3.5min on platform/analysis/canary-analysis.yaml
# judging THIS canary's hash against Mimir; failure aborts and scales the
# canary to zero with the failing measurements retained.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gateway
  annotations:
    # Rollouts' EVENT-driven notifications resolve subscriptions from these
    # annotations (the configmap's global subscriptions list only serves the
    # engine's api-eval path, which bare event triggers never satisfy -
    # verified live: completion fired nothing until these existed).
    notifications.argoproj.io/subscribe.on-rollout-completed.agent: ""
    notifications.argoproj.io/subscribe.on-rollout-aborted.agent: ""
    notifications.argoproj.io/subscribe.on-analysis-run-failed.agent: ""
spec:
  replicas: 4
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: gateway
  workloadRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
    scaleDown: onsuccess
  strategy:
    canary:
      steps:
        - setWeight: 25
        - analysis: &canary-analysis
            templates:
              - templateName: canary-analysis
            args:
              - name: job
                value: gateway
              - name: canary-hash
                valueFrom:
                  podTemplateHashValue: Latest
        - setWeight: 50
        - analysis: *canary-analysis
