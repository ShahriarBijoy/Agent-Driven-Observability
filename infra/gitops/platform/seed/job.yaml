apiVersion: batch/v1
kind: Job
metadata:
  name: seed
  labels:
    app: seed
  annotations:
    # Argo CD hook, not desired state (P10): a completed Job is immutable and
    # TTL-cleanup would read as permanent drift. As a PostSync hook it reruns
    # on every platform sync - safe because the seeder upserts
    # (onConflictDoNothing) - and is recreated fresh each time.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  # Auto-cleanup lets a later `kubectl apply -k` recreate the Job instead of
  # colliding with the completed (immutable) one. The deploy script also
  # deletes it defensively before applying.
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: obs/retriever
          workingDir: /app/apps/retriever
          command: ["bun", "run", "seed"]
          envFrom:
            - secretRef:
                name: subject-db-credentials
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 384Mi
