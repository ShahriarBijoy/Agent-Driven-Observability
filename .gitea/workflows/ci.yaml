# CI for the subject system (PLAN-2 P9). Runs on the VM's act_runner against
# the Gitea copy of this repo (obs/obs-lab): test -> build+push -> deploy.
#
# Steps stay plain `run` commands on purpose - Gitea Actions is ~95%
# GitHub-compatible, and marketplace actions that assume GitHub APIs are the
# 5%. actions/checkout is the one exception (it's the compatible core).
#
# The runner mounts the VM's Docker socket into job containers, so `docker
# build/push localhost:5010/...` executes on the VM daemon - localhost IS the
# k3d registry. The kubeconfig arrives as a repo Actions secret
# (KUBECONFIG_B64, provisioned by scripts/ci-bootstrap.sh); its server name
# obs-vm resolves inside job containers via the runner's --add-host.
name: ci
run-name: "${{ gitea.actor }}: ${{ gitea.event.head_commit.message }}"

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      - name: install
        run: bun install --frozen-lockfile
      - name: test
        run: bun run test

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build once, push :sha + :dev for every service
        run: |
          sha=$(git rev-parse --short HEAD)
          docker build -f infra/Dockerfile -t obs-app:$sha .
          for svc in gateway embedder retriever model-proxy load-generator; do
            docker tag obs-app:$sha localhost:5010/$svc:$sha
            docker tag obs-app:$sha localhost:5010/$svc:dev
            docker push -q localhost:5010/$svc:$sha
            docker push -q localhost:5010/$svc:dev
          done

  deploy:
    # Trunk-based: only main reaches the cluster. P10: "deploy" is one commit
    # bumping the pinned tags in obs/obs-gitops - Argo CD notices (push
    # webhook through the k3d LB), syncs, and the Rollouts take it from
    # there. CI never touches the cluster; kubectl left the building.
    # The bump names the source sha + run so the agent can walk
    # annotation -> gitops commit -> source commit without guessing.
    needs: build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: bump image tags in obs-gitops
        run: |
          sha=$(echo "${{ github.sha }}" | cut -c1-7)
          git clone "http://obs:${{ secrets.GITOPS_TOKEN }}@gitea:3000/obs/obs-gitops.git" /tmp/gitops
          cd /tmp/gitops
          for svc in gateway embedder retriever model-proxy load-generator; do
            sed -i "s/newTag: .*/newTag: \"$sha\"/" services/$svc/kustomization.yaml
          done
          git config user.name obs-ci
          git config user.email ci@obs-lab.local
          git add -A
          if git diff --cached --quiet; then
            echo "tags already at :$sha - nothing to deploy"; exit 0
          fi
          git commit -m "deploy: :$sha via ci run ${{ github.run_number }}" \
                     -m "source: ${{ github.repository }}@${{ github.sha }}"
          # One rebase-retry absorbs a racing run's bump; a real conflict
          # (same lines) should fail loudly, not silently self-merge.
          git push origin main || { git pull --rebase origin main && git push origin main; }
