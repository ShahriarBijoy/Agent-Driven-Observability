# CI for the subject system (PLAN-2 P9). Runs on the VM's act_runner against
# the Gitea copy of this repo (obs/obs-lab): classify -> test -> build+push.
#
# Deploy is NOT here anymore - it's a manual workflow_dispatch in
# deploy.yaml. An alert->postmortem->merge->deploy-everything loop on an 8GB
# VM produced more alerts than it resolved; now a human presses the button.
#
# Steps stay plain `run` commands on purpose - Gitea Actions is ~95%
# GitHub-compatible, and marketplace actions that assume GitHub APIs are the
# 5%. actions/checkout is the one exception (it's the compatible core).
#
# The runner mounts the VM's Docker socket into job containers, so `docker
# build/push localhost:5010/...` executes on the VM daemon - localhost IS the
# k3d registry.
name: ci
run-name: "${{ gitea.actor }}: ${{ gitea.event.head_commit.message }}"

on:
  push:
    # The oncall agent pushes a branch per incident; those are docs-only by
    # construction and each build competes with the cluster for the VM's RAM.
    branches-ignore:
      - "postmortem/**"

jobs:
  changes:
    # Docs-only pushes (postmortem merges, plan edits) must not cost a test
    # run or an image build - and above all must not look deployable.
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.diff.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: classify changed files
        id: diff
        run: |
          before='${{ gitea.event.before }}'
          zeros='0000000000000000000000000000000000000000'
          if [ -n "$before" ] && [ "$before" != "$zeros" ] && git cat-file -e "$before^{commit}" 2>/dev/null; then
            base="$before"
          else
            # New branch or unknown base: judge a merge commit by what it
            # brought in (diff vs first parent); root commits count as code.
            base=$(git rev-parse HEAD^1 2>/dev/null || echo '')
          fi
          if [ -z "$base" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          files=$(git diff --name-only "$base" HEAD)
          echo "changed files:"; echo "$files"
          if [ -z "$files" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
          elif echo "$files" | grep -qvE '^docs/|\.md$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      - name: install
        run: bun install --frozen-lockfile
      - name: test
        run: bun run test

  build-push:
    # Only main gets images: nothing consumes feature-branch tags, and each
    # docker build steals RAM from the cluster sharing this VM.
    needs: [changes, test]
    if: gitea.ref == 'refs/heads/main' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build once, push :sha + :dev for every service
        run: |
          sha=$(git rev-parse --short HEAD)
          docker build -f infra/Dockerfile -t obs-app:$sha .
          for svc in gateway embedder retriever model-proxy load-generator; do
            docker tag obs-app:$sha localhost:5010/$svc:$sha
            docker tag obs-app:$sha localhost:5010/$svc:dev
            docker push -q localhost:5010/$svc:$sha
            docker push -q localhost:5010/$svc:dev
          done
